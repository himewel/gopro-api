name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  auto-label:
    name: Auto-label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: bcoe/conventional-release-labels@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignored_types: '["chore"]'
          type_labels: '{"feat":"feature","fix":"fix","perf":"performance","refactor":"refactor","docs":"documentation","test":"test","build":"build","ci":"ci","breaking_change":"breaking change"}'

  lint-and-build:
    name: Lint and build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev tools
        run: uv pip install -e ".[dev]"

      - name: Black (pyproject.toml [tool.black])
        run: uv run black --check gopro_api

      - name: Pylint (pyproject.toml [tool.pylint])
        run: uv run pylint gopro_api --recursive=y

      - name: Build wheel and sdist (pyproject.toml [build-system])
        run: uv build

  docs:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: uv pip install -e ".[docs]"

      - name: Build MkDocs site (--strict)
        run: uv run mkdocs build --strict
