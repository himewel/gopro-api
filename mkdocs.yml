site_name: gopro-api
site_url: https://himewel.github.io/gopro-api/
repo_url: https://github.com/himewel/gopro-api
repo_name: himewel/gopro-api

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: green
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey
      accent: green
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  version_provider: mike

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - pymdownx.snippets

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
            show_root_heading: true
            members_order: source

nav:
  - Home: index.md
  - API Reference:
    - API: api/api.md
    - Client: api/client.md
    - Models: api/models.md
    - CLI: api/cli.md
    - Utils: api/utils.md
    - Exceptions: api/exceptions.md
